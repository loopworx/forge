# Forge v2 Configuration
# Generated by forge init

active: true
maxConcurrentStories: 1

linear:
  pollIntervalSeconds: 30
  teamId: ""
  teamName: ""

agents:
  developer-agent:
    pullStates: [ready-for-dev]
    activeState: in-dev
    primarySkill: running-atdd-sessions
    interactive: false
    humanGate: false
  po-agent:
    pullStates: [in-analysis, ready-for-acceptance]
    activeState: in-acceptance
    primarySkill: facilitating-inception
    interactive: true
    humanGate: true
  qa-agent:
    pullStates: [ready-for-qa]
    activeState: in-qa
    primarySkill: running-regression-suite
    interactive: true
    humanGate: false
  architect-agent:
    pullStates: [in-analysis]
    activeState: in-analysis
    primarySkill: deciding-architecture
    interactive: true
    humanGate: true
  ux-agent:
    pullStates: [in-analysis]
    activeState: in-analysis
    primarySkill: designing-ux
    interactive: true
    humanGate: false
  devops-agent:
    pullStates: [ready-to-deploy]
    activeState: ready-to-deploy
    primarySkill: bootstrapping-project
    interactive: false
    humanGate: false
  secops-agent:
    pullStates: [in-analysis]
    activeState: in-analysis
    primarySkill: modeling-threats
    interactive: true
    humanGate: true

inception:
  phases:
    - phase: 1
      name: Event Storming
      skill: facilitating-event-storming
      agent: architect-agent
      output: event-storming-artifacts
    - phase: 2
      name: Ubiquitous Language
      skill: establishing-ubiquitous-language
      agent: po-agent
      output: CONTEXT.md
    - phase: 3
      name: Architecture Decision
      skill: deciding-architecture
      agent: architect-agent
      output: adr/0000-architecture-decision.md
    - phase: 4
      name: Architecture Establishment
      skill: establishing-architecture
      agent: architect-agent
      output: architecture-artifacts
    - phase: 5
      name: Tech Stack
      skill: selecting-tech-stack
      agent: devops-agent
      output: tech-stack-artifacts
    - phase: 6
      name: UX Design
      skill: designing-ux
      agent: ux-agent
      output: design-system/MASTER.md
    - phase: 7
      name: Writing Stories
      skill: writing-stories
      agent: po-agent
      output: story-list
    - phase: 8
      name: Iteration Mapping
      skill: building-iteration-map
      agent: po-agent
      output: iteration-map

dashboard:
  sidebarWidth: 40

# project.constraints.yaml
#
# Generated during Trade-off Sliders exercise (facilitating-inception skill).
# Owned by the po-agent. Read by ALL agents at session start.
# These priorities are FINAL for this project — do not override per-story.
#
# Trade-off sliders: ranked 1 (highest) to 4 (lowest). No ties allowed.

priorities:
  quality: 1       # correctness, test coverage, no regressions
  security: 2      # threat model compliance, no known vulns in pipeline
  ux: 3            # user experience, accessibility, performance
  cost: 4          # infrastructure cost, build time, agent token usage

# Max concurrent developer agents (human decision — cost + oversight tradeoff)
max_parallel_developer_agents: 2

# Feature flag platform
feature_flags:
  platform: unleash
  server_url: ""
  default_strategy: userWithId

# Test environment
environments:
  test_url: ""
  production_url: ""

# Loop contracts — canonical commands and budgets for every loop-capable skill.
# All loop-state files read these to determine proof commands and halt thresholds.
loop:
  outer_at_command: "npm run test:acceptance -- --story $STORY_ID --ac $AC_ID"
  component_test_command: "npm test -- component"
  cdc_test_command: "npm test -- contract"
  regression_command: "npm run test:regression"
  smoke_command: "npm run test:smoke"
  max_iterations_per_subslice: 5
  max_no_progress_retries: 2
  max_story_loop_minutes: 45
  max_story_loop_cost_usd: 2.00
